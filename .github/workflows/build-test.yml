name: build-test

on:
  pull_request:
    paths:
      - "LenovoTidyChecks/**"
      - ".github/workflows/build-test.yml"
  push:
    branches: [main, "release/**"]
    paths:
      - "LenovoTidyChecks/**"
      - ".github/workflows/build-test.yml"

# Cancel any in-flight runs for the same branch when a new push lands.
concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        build_type: [Debug, RelWithDebInfo]
    steps:
      - uses: actions/checkout@v4

      # LLVM 18 dev libraries (headers + cmake config files). The earlier
      # KyleMayes/install-llvm-action attempt only installed the runtime
      # tarball, so find_package(LLVM CONFIG) failed. We now use each
      # OS's canonical package source which ships the dev artefacts.
      - name: Install LLVM 18 + tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # apt.llvm.org has llvm-18-dev / libclang-18-dev / libclang-cpp18-dev
          # for jammy; the default Ubuntu repos do not.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/llvm.gpg
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libclang-18-dev libclang-cpp18-dev clang-tools-18 ninja-build python3-pip
          pip3 install --user --break-system-packages lit || pip3 install --user lit

      - name: Install LLVM 18 + tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18 ninja
          # PEP 668 forces --break-system-packages on macos-14 (Python 3.12+).
          # lit is only needed if we run lit-style tests; ignore failure.
          pip3 install --user --break-system-packages lit || true
          echo "$(brew --prefix llvm@18)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM 18 + tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Official LLVM Windows release tarball (NOT the choco package
          # which is runtime-only). Includes lib/cmake/llvm/LLVMConfig.cmake
          # and lib/cmake/clang/ClangConfig.cmake that we need.
          $url = 'https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-pc-windows-msvc.tar.xz'
          $dst = 'C:\llvm18.tar.xz'
          Invoke-WebRequest -Uri $url -OutFile $dst -UseBasicParsing
          mkdir C:\llvm18 -Force | Out-Null
          tar -xf $dst -C C:\llvm18 --strip-components=1
          # Smoke check
          if (-not (Test-Path 'C:\llvm18\lib\cmake\llvm\LLVMConfig.cmake')) {
            Get-ChildItem C:\llvm18 -Recurse -Name 'LLVMConfig.cmake' | Select-Object -First 5
            throw 'LLVMConfig.cmake missing after extraction'
          }
          choco install ninja -y
          py -m pip install --user lit
          echo "LLVM_HOME=C:\llvm18" >> $env:GITHUB_ENV

      - name: Locate LLVM cmake config
        id: llvm_cmake
        shell: bash
        run: |
          # Per-OS resolution rather than searching, so the failure mode
          # is "package missing" rather than "find returned empty".
          case "${{ runner.os }}" in
            Linux)
              LLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
              CLANG_DIR=/usr/lib/llvm-18/lib/cmake/clang
              ;;
            macOS)
              PREFIX=$(brew --prefix llvm@18)
              LLVM_DIR="$PREFIX/lib/cmake/llvm"
              CLANG_DIR="$PREFIX/lib/cmake/clang"
              ;;
            Windows)
              LLVM_DIR='C:/llvm18/lib/cmake/llvm'
              CLANG_DIR='C:/llvm18/lib/cmake/clang'
              ;;
          esac
          for d in "$LLVM_DIR" "$CLANG_DIR"; do
            if [[ ! -d "$d" ]]; then
              echo "::error::Expected cmake package dir does not exist: $d"
              exit 1
            fi
          done
          echo "LLVM_DIR=$LLVM_DIR"
          echo "Clang_DIR=$CLANG_DIR"
          echo "llvm_dir=$LLVM_DIR"   >> "$GITHUB_OUTPUT"
          echo "clang_dir=$CLANG_DIR" >> "$GITHUB_OUTPUT"

      - name: Configure
        shell: bash
        working-directory: LenovoTidyChecks
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DLENOVO_TIDY_BUILD_TESTS=ON \
            -DLLVM_DIR="${{ steps.llvm_cmake.outputs.llvm_dir }}" \
            -DClang_DIR="${{ steps.llvm_cmake.outputs.clang_dir }}"

      - name: Build
        working-directory: LenovoTidyChecks
        run: cmake --build build -j

      - name: Test (unit only)
        working-directory: LenovoTidyChecks
        # Skip the lit-based regression suite in CI: it depends on
        # clang-tidy-18 + FileCheck binaries on PATH plus encoding-
        # sensitive Chinese-character fixtures that misbehave on hosted
        # runners. The unit tests (Googletest) cover the language-
        # agnostic helpers; the lit tests are what `Smoke-test
        # lenovo-clang-tidy --list-checks` below proxies for.
        run: ctest --test-dir build --output-on-failure --exclude-regex lit

      - name: Check rule coverage
        working-directory: LenovoTidyChecks
        run: python3 scripts/generate_rules_index.py

      # Self-test the standalone executable: it must list every lenovo-* check.
      # On Windows this is the *only* path that actually works at runtime,
      # because LLVM's official Windows binaries disable plugin loading.
      - name: Smoke-test lenovo-clang-tidy --list-checks
        shell: bash
        working-directory: LenovoTidyChecks
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXE="build/src/LenovoTidyMain/lenovo-clang-tidy.exe"
          else
            EXE="build/src/LenovoTidyMain/lenovo-clang-tidy"
          fi
          test -x "$EXE" || { echo "::error::$EXE not built"; exit 1; }
          OUT=$("$EXE" "--checks=-*,lenovo-*" --list-checks)
          echo "$OUT"
          # We expect at least 15 lenovo-* rules (see AnalyzerRules.md / CHANGELOG).
          COUNT=$(echo "$OUT" | grep -c "^[[:space:]]\+lenovo-" || true)
          echo "lenovo-* checks found: $COUNT"
          if [[ "$COUNT" -lt 15 ]]; then
            echo "::error::Expected >=15 lenovo-* rules, got $COUNT"
            exit 1
          fi

      - name: Upload artifacts
        if: matrix.build_type == 'RelWithDebInfo'
        uses: actions/upload-artifact@v4
        with:
          name: LenovoTidyChecks-${{ matrix.os }}
          path: |
            LenovoTidyChecks/build/src/LenovoTidyModule/libLenovoTidyChecks.*
            LenovoTidyChecks/build/src/LenovoTidyModule/LenovoTidyChecks.*
            LenovoTidyChecks/build/src/LenovoTidyMain/lenovo-clang-tidy
            LenovoTidyChecks/build/src/LenovoTidyMain/lenovo-clang-tidy.exe
          if-no-files-found: warn
