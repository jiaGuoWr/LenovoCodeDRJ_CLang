name: build-test

on:
  pull_request:
    paths:
      - "LenovoTidyChecks/**"
      - ".github/workflows/build-test.yml"
  push:
    branches: [main, "release/**"]
    paths:
      - "LenovoTidyChecks/**"
      - ".github/workflows/build-test.yml"

# Cancel any in-flight runs for the same branch when a new push lands.
concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        build_type: [Debug, RelWithDebInfo]
    steps:
      - uses: actions/checkout@v4

      # KyleMayes/install-llvm-action ships the LLVM developer libraries
      # (headers + cmake config files) on all 3 OSes. The previously used
      # path - apt-get install / choco install - either pulled the wrong
      # packages (Ubuntu's defaults lack libclang-cpp18-dev) or only
      # provided the runtime tarball (choco LLVM has no cmake/llvm/
      # config files, so find_package(LLVM CONFIG) fails). The action
      # caches the install for subsequent runs.
      - name: Install LLVM 18
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1"
          cached: true

      - name: Install ninja + lit
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get install -y ninja-build python3-pip
            pip3 install --user --break-system-packages lit || pip3 install --user lit
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install ninja
            pip3 install --user --break-system-packages lit || true
          else
            choco install ninja -y
            py -m pip install --user lit
          fi

      - name: Locate LLVM cmake config
        id: llvm_cmake
        shell: bash
        run: |
          # KyleMayes/install-llvm-action exports LLVM_PATH to GITHUB_ENV.
          # Discover the actual LLVMConfig.cmake / ClangConfig.cmake
          # location instead of guessing the layout (may differ between
          # OSes and between LLVM project releases).
          echo "LLVM_PATH=$LLVM_PATH"
          ls -la "$LLVM_PATH" 2>&1 | head -20 || true
          LLVM_CFG=$(find "$LLVM_PATH" -name 'LLVMConfig.cmake' 2>/dev/null | head -1)
          CLANG_CFG=$(find "$LLVM_PATH" -name 'ClangConfig.cmake' 2>/dev/null | head -1)
          if [[ -z "$LLVM_CFG" || -z "$CLANG_CFG" ]]; then
            echo "::error::LLVMConfig.cmake or ClangConfig.cmake not found under $LLVM_PATH"
            find "$LLVM_PATH" -name '*Config.cmake' 2>&1 | head -20
            exit 1
          fi
          LLVM_DIR=$(dirname "$LLVM_CFG")
          CLANG_DIR=$(dirname "$CLANG_CFG")
          echo "LLVM_DIR=$LLVM_DIR"
          echo "Clang_DIR=$CLANG_DIR"
          echo "llvm_dir=$LLVM_DIR" >> "$GITHUB_OUTPUT"
          echo "clang_dir=$CLANG_DIR" >> "$GITHUB_OUTPUT"

      - name: Configure
        shell: bash
        working-directory: LenovoTidyChecks
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DLENOVO_TIDY_BUILD_TESTS=ON \
            -DLLVM_DIR="${{ steps.llvm_cmake.outputs.llvm_dir }}" \
            -DClang_DIR="${{ steps.llvm_cmake.outputs.clang_dir }}"

      - name: Build
        working-directory: LenovoTidyChecks
        run: cmake --build build -j

      - name: Test
        working-directory: LenovoTidyChecks
        run: ctest --test-dir build --output-on-failure

      - name: Check rule coverage
        working-directory: LenovoTidyChecks
        run: python3 scripts/generate_rules_index.py

      # Self-test the standalone executable: it must list every lenovo-* check.
      # On Windows this is the *only* path that actually works at runtime,
      # because LLVM's official Windows binaries disable plugin loading.
      - name: Smoke-test lenovo-clang-tidy --list-checks
        shell: bash
        working-directory: LenovoTidyChecks
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXE="build/src/LenovoTidyMain/lenovo-clang-tidy.exe"
          else
            EXE="build/src/LenovoTidyMain/lenovo-clang-tidy"
          fi
          test -x "$EXE" || { echo "::error::$EXE not built"; exit 1; }
          OUT=$("$EXE" "--checks=-*,lenovo-*" --list-checks)
          echo "$OUT"
          # We expect at least 15 lenovo-* rules (see AnalyzerRules.md / CHANGELOG).
          COUNT=$(echo "$OUT" | grep -c "^[[:space:]]\+lenovo-" || true)
          echo "lenovo-* checks found: $COUNT"
          if [[ "$COUNT" -lt 15 ]]; then
            echo "::error::Expected >=15 lenovo-* rules, got $COUNT"
            exit 1
          fi

      - name: Upload artifacts
        if: matrix.build_type == 'RelWithDebInfo'
        uses: actions/upload-artifact@v4
        with:
          name: LenovoTidyChecks-${{ matrix.os }}
          path: |
            LenovoTidyChecks/build/src/LenovoTidyModule/libLenovoTidyChecks.*
            LenovoTidyChecks/build/src/LenovoTidyModule/LenovoTidyChecks.*
            LenovoTidyChecks/build/src/LenovoTidyMain/lenovo-clang-tidy
            LenovoTidyChecks/build/src/LenovoTidyMain/lenovo-clang-tidy.exe
          if-no-files-found: warn
