name: docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "LenovoTidyChecks/docs/**"
      - "AnalyzerRules.md"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build site
        # mkdocs.yml lives at LenovoTidyChecks/ (next to docs/) per the
        # current mkdocs convention that forbids docs_dir == config_dir.
        # NOT --strict because some legitimate cross-tree links (e.g. to
        # the repo-root AnalyzerRules.md, which lives outside docs/) emit
        # warnings that should not fail the build.
        working-directory: LenovoTidyChecks
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: LenovoTidyChecks/site

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
