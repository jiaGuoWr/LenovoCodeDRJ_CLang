name: release

on:
  push:
    tags: ["v*"]

jobs:
  package:
    name: package-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt update
              sudo apt install -y llvm-18-dev libclang-18-dev libclang-cpp18-dev clang-tools-18 ninja-build
              ;;
            macOS)
              brew install llvm@18 ninja
              echo "$(brew --prefix llvm@18)/bin" >> $GITHUB_PATH
              ;;
            Windows)
              choco install llvm --version=18.1.8 -y
              choco install ninja -y
              ;;
          esac

      - name: Configure
        shell: bash
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLENOVO_TIDY_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j

      - name: Stage
        shell: bash
        run: |
          mkdir -p dist/LenovoTidyChecks
          cp -R build/src/LenovoTidyModule/libLenovoTidyChecks.* dist/LenovoTidyChecks/ 2>/dev/null || true
          cp -R build/src/LenovoTidyModule/LenovoTidyChecks.*    dist/LenovoTidyChecks/ 2>/dev/null || true
          cp -R src/LenovoTidyModule/common dist/LenovoTidyChecks/headers-common
          cp LICENSE CHANGELOG.md README.md dist/LenovoTidyChecks/
          cp -R docs dist/LenovoTidyChecks/docs

      - name: Pack
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a LenovoTidyChecks-${{ github.ref_name }}-${{ runner.os }}.zip LenovoTidyChecks
          else
            tar -czf LenovoTidyChecks-${{ github.ref_name }}-${{ runner.os }}.tar.gz LenovoTidyChecks
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LenovoTidyChecks-${{ github.ref_name }}-*.tar.gz
            dist/LenovoTidyChecks-${{ github.ref_name }}-*.zip
